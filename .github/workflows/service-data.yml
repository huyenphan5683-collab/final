name: service-data

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose run mode"
        required: true
        default: "generate_unified"
        type: choice
        options:
          - validate_existing
          - generate_unified

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas openpyxl numpy

      - name: Prepare folders
        run: |
          mkdir -p output
          mkdir -p data

      - name: Validate existing inputs
        if: ${{ inputs.mode == 'validate_existing' }}
        run: python validate_existing_inputs.py

      - name: Generate unified dataset
        if: ${{ inputs.mode == 'generate_unified' }}
        run: python generate_unified_service_data.py

      - name: Show output files
        run: |
          echo "Listing output directory"
          ls -lah output || true

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: service-data-output
          path: output/**
          if-no-files-found: warn
